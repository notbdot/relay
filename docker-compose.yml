services:
  sluice:
    build: .
    restart: unless-stopped
    ports:
      - "2935:2935"        # HTTP (viewer + admin)
      - "9999:9999/udp"    # SRT — OBS stream input
      - "9998:9998/udp"    # SRT — camera feed input
    volumes:
      - ./data:/data       # persists sluice.json and HLS segments
    environment:
      SLUICE_SEGMENTS_DIR: "/data/segments"
      SLUICE_DB_PATH: "/data/sluice.json"
    working_dir: /data
