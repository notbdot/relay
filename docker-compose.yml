services:
  sluice:
    build: .
    restart: unless-stopped
    ports:
      - "2935:2935"       # viewer + admin
      - "9999:9999/udp"   # SRT ingest
    volumes:
      - ./data:/data      # persists sluice.json and HLS segments
    environment:
      # Override defaults if needed:
      # SLUICE_SERVER_PORT: "2935"
      # SLUICE_SRT_PORT: "9999"
      # SLUICE_SEGMENTS_DIR: "/data/segments"
      # SLUICE_DB_PATH: "/data/sluice.json"
      SLUICE_SEGMENTS_DIR: "/data/segments"
      SLUICE_DB_PATH: "/data/sluice.json"
    working_dir: /data
