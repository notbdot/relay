services:
  relay:
    image: ghcr.io/notbdot/relay:latest
    # To build locally instead: comment out image, uncomment build
    # build: .
    restart: unless-stopped
    network_mode: host     # SRT/UDP stream data gets dropped by Docker bridge NAT
    volumes:
      - ./data:/data
    environment:
      RELAY_SEGMENTS_DIR: "/data/segments"
      RELAY_DB_PATH: "/data/relay.json"
    working_dir: /data
