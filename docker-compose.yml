services:
  sluice:
    build: .
    restart: unless-stopped
    network_mode: host     # SRT/UDP stream data gets dropped by Docker bridge NAT
    volumes:
      - ./data:/data
    environment:
      SLUICE_SEGMENTS_DIR: "/data/segments"
      SLUICE_DB_PATH: "/data/sluice.json"
    working_dir: /data
