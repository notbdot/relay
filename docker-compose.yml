services:
  relay:
    build: .
    # image: ghcr.io/notbdot/relay:latest  # uncomment once GHCR image is published and public
    restart: unless-stopped
    network_mode: host     # SRT/UDP stream data gets dropped by Docker bridge NAT
    volumes:
      - ./data:/data
    environment:
      RELAY_SEGMENTS_DIR: "/data/segments"
      RELAY_DB_PATH: "/data/relay.json"
    working_dir: /data
