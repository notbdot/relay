<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #f7f6f3;
    --surface:    #ffffff;
    --surface2:   #f0ede8;
    --border:     rgba(0,0,0,0.07);
    --fg:         #1a1917;
    --muted:      #8a8780;
    --accent:     #c27d3a;
    --accent-dim: rgba(194,125,58,0.10);
    --live:       #3d9e60;
    --radius:     10px;
    --chat-w:     320px;
    --shadow:     0 2px 16px rgba(0,0,0,0.06);
    --shadow-lg:  0 8px 40px rgba(0,0,0,0.10);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* === Main column === */
  #main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    padding: 20px 0 20px 20px;
    overflow: hidden;
  }

  /* === Player === */
  #player-wrap {
    position: relative;
    background: #0d0d0d;
    border-radius: var(--radius);
    overflow: hidden;
    width: 100%;
    aspect-ratio: 16/9;
    max-height: calc(100vh - 110px);
    flex-shrink: 0;
    box-shadow: var(--shadow-lg);
  }

  #player-wrap video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #0d0d0d;
  }

  #offline-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0d0d0d;
    gap: 14px;
    opacity: 1;
    transition: opacity 350ms ease;
  }
  #offline-overlay.hidden { opacity: 0; pointer-events: none; }

  #offline-label {
    color: #555;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* === Stream meta === */
  #stream-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 2px 0;
    flex-shrink: 0;
  }

  #live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 400ms;
  }
  #live-dot.live {
    background: var(--live);
    animation: pulse-dot 2.6s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.45; }
  }

  #stream-title {
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--fg);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  #viewer-count {
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* === Sync button === */
  #sync-btn {
    display: none;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: color 200ms, border-color 200ms;
    flex-shrink: 0;
  }
  #sync-btn:hover { color: var(--accent); border-color: var(--accent); }
  #sync-btn.visible { display: block; }

  /* === Quality picker === */
  #quality-wrap {
    position: relative;
    flex-shrink: 0;
  }
  #quality-btn {
    display: none;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: color 200ms, border-color 200ms;
  }
  #quality-btn:hover { color: var(--accent); border-color: var(--accent); }
  #quality-btn.visible { display: block; }

  #quality-menu {
    position: absolute;
    bottom: calc(100% + 6px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    min-width: 130px;
    z-index: 50;
  }
  #quality-menu.hidden { display: none; }

  .quality-option {
    padding: 8px 14px;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--muted);
    transition: background 150ms, color 150ms;
    font-family: inherit;
  }
  .quality-option:hover { background: var(--surface2); color: var(--fg); }
  .quality-option.active { color: var(--accent); font-weight: 500; }

  /* === Chat panel === */
  #chat-panel {
    width: var(--chat-w);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 20px 16px 16px;
    gap: 0;
    overflow: hidden;
  }

  #chat-header {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }
  #chat-messages::-webkit-scrollbar { width: 3px; }
  #chat-messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .chat-msg {
    display: flex;
    gap: 6px;
    padding: 4px 6px;
    border-radius: 6px;
    font-size: 0.85rem;
    line-height: 1.45;
    animation: msgIn 150ms ease-out both;
    transition: background 200ms;
  }
  .chat-msg:hover { background: var(--surface2); }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .chat-username {
    font-weight: 600;
    font-size: 0.78rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .chat-text { color: var(--fg); word-break: break-word; }

  /* === Chat input === */
  #chat-input-area {
    display: flex;
    flex-direction: column;
    gap: 7px;
    flex-shrink: 0;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  #username-display {
    font-size: 0.73rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  #change-username-btn {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 0.73rem;
    padding: 0;
    font-family: inherit;
    opacity: 0.8;
    transition: opacity 200ms;
  }
  #change-username-btn:hover { opacity: 1; }

  #chat-form { display: flex; gap: 7px; }

  #chat-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--fg);
    font-family: inherit;
    font-size: 0.85rem;
    padding: 8px 11px;
    outline: none;
    transition: border-color 200ms, box-shadow 200ms;
    box-shadow: var(--shadow);
  }
  #chat-input:focus {
    border-color: rgba(194,125,58,0.4);
    box-shadow: 0 0 0 3px rgba(194,125,58,0.08);
  }
  #chat-input::placeholder { color: var(--muted); }

  #chat-send {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 8px 13px;
    transition: opacity 200ms;
    white-space: nowrap;
  }
  #chat-send:hover { opacity: 0.88; }

  /* === Username modal === */
  #username-modal {
    position: fixed;
    inset: 0;
    background: rgba(247,246,243,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(6px);
    animation: fadeIn 200ms ease;
  }
  #username-modal.hidden { display: none; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  #username-dialog {
    background: var(--surface);
    border-radius: 12px;
    padding: 28px 30px;
    width: 320px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    animation: slideUp 250ms ease;
  }

  @keyframes slideUp {
    from { transform: translateY(12px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  #username-dialog h3 {
    font-size: 0.95rem;
    font-weight: 500;
    margin-bottom: 14px;
    color: var(--fg);
  }

  #username-field {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--fg);
    font-family: inherit;
    font-size: 0.9rem;
    padding: 9px 11px;
    outline: none;
    transition: border-color 200ms;
    margin-bottom: 10px;
  }
  #username-field:focus { border-color: rgba(194,125,58,0.5); }

  #username-submit {
    width: 100%;
    background: var(--fg);
    border: none;
    border-radius: 8px;
    color: var(--bg);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 9px;
    transition: opacity 200ms;
  }
  #username-submit:hover { opacity: 0.82; }

  /* === Mobile === */
  @media (max-width: 720px) {
    html, body { overflow: auto; }
    #app { flex-direction: column; height: auto; overflow: auto; }
    #main { padding: 12px 12px 0; overflow: visible; }
    #player-wrap { max-height: none; border-radius: 8px; }
    #chat-panel { width: 100%; height: 440px; padding: 12px 12px 12px; }
  }
</style>
</head>
<body>

<div id="username-modal">
  <div id="username-dialog">
    <h3>Choose a username</h3>
    <input id="username-field" type="text" placeholder="viewer_1234" maxlength="32" spellcheck="false" autocomplete="off">
    <button id="username-submit">Join chat →</button>
  </div>
</div>

<div id="app">
  <div id="main">
    <div id="player-wrap">
      <video id="video" controls playsinline></video>
      <div id="offline-overlay">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="23" stroke="#333" stroke-width="1.5"/>
          <path d="M19 15l14 9-14 9V15z" fill="#333"/>
        </svg>
        <span id="offline-label">Stream offline</span>
      </div>
    </div>
    <div id="stream-meta">
      <div id="live-dot"></div>
      <div id="stream-title">Loading...</div>
      <div id="viewer-count"></div>
      <button id="sync-btn" title="Sync to live edge">↺ Live</button>
      <div id="quality-wrap">
        <button id="quality-btn" title="Quality">⚙ Auto</button>
        <div id="quality-menu" class="hidden"></div>
      </div>
    </div>
  </div>

  <div id="chat-panel">
    <div id="chat-header">Live chat</div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <div id="username-display">
        Chatting as <strong id="current-username-display"></strong>
        <button id="change-username-btn">change</button>
      </div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="Say something..." maxlength="300" autocomplete="off">
        <button type="submit" id="chat-send">Send</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
(function() {
  'use strict';

  // --- Username ---
  function randomUsername() { return 'viewer_' + Math.floor(Math.random() * 9000 + 1000); }

  let username = localStorage.getItem('sluice_username');
  const modal = document.getElementById('username-modal');
  const usernameField = document.getElementById('username-field');
  const currentUsernameDisplay = document.getElementById('current-username-display');

  function setUsername(name) {
    name = name.trim().replace(/[^a-zA-Z0-9_\-\.]/g, '').slice(0, 32) || randomUsername();
    username = name;
    localStorage.setItem('sluice_username', username);
    currentUsernameDisplay.textContent = username;
    modal.classList.add('hidden');
    reconnectWS();
  }

  if (!username) {
    usernameField.value = randomUsername();
    usernameField.focus();
    usernameField.select();
  } else {
    modal.classList.add('hidden');
    currentUsernameDisplay.textContent = username;
  }

  document.getElementById('username-submit').addEventListener('click', () => setUsername(usernameField.value || randomUsername()));
  usernameField.addEventListener('keydown', e => { if (e.key === 'Enter') setUsername(usernameField.value || randomUsername()); });
  document.getElementById('change-username-btn').addEventListener('click', () => {
    usernameField.value = username;
    modal.classList.remove('hidden');
    usernameField.focus();
    usernameField.select();
  });

  // --- Player ---
  const video = document.getElementById('video');
  const offlineOverlay = document.getElementById('offline-overlay');
  const liveDot = document.getElementById('live-dot');
  const streamTitle = document.getElementById('stream-title');
  const viewerCount = document.getElementById('viewer-count');
  let hlsInstance = null;

  function startPlayer() {
    const src = '/hls/live.m3u8';
    if (Hls.isSupported()) {
      if (hlsInstance) hlsInstance.destroy();
      hlsInstance = new Hls({ liveSyncDurationCount: 3, liveMaxLatencyDurationCount: 6, enableWorker: true, lowLatencyMode: true });
      hlsInstance.loadSource(src);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => {});
        buildQualityMenu();
      });
      hlsInstance.on(Hls.Events.ERROR, (e, d) => { if (d.fatal && d.type === Hls.ErrorTypes.NETWORK_ERROR) setTimeout(startPlayer, 5000); });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = src;
      video.play().catch(() => {});
    }
  }

  function setStreamOnline(online, title) {
    if (online) {
      offlineOverlay.classList.add('hidden');
      liveDot.classList.add('live');
      document.getElementById('sync-btn').classList.add('visible');
      document.getElementById('quality-btn').classList.add('visible');
      if (!hlsInstance) startPlayer();
    } else {
      offlineOverlay.classList.remove('hidden');
      liveDot.classList.remove('live');
      document.getElementById('sync-btn').classList.remove('visible');
      document.getElementById('quality-btn').classList.remove('visible');
      document.getElementById('quality-menu').classList.add('hidden');
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    }
    if (title) { streamTitle.textContent = title; document.title = (online ? '● ' : '') + title; }
  }

  // --- Quality picker ---
  const qualityBtn  = document.getElementById('quality-btn');
  const qualityMenu = document.getElementById('quality-menu');

  function buildQualityMenu() {
    qualityMenu.innerHTML = '';
    const levels = hlsInstance ? hlsInstance.levels : [];
    const current = hlsInstance ? hlsInstance.currentLevel : -1;

    const makeOpt = (label, level) => {
      const el = document.createElement('div');
      el.className = 'quality-option' + (current === level ? ' active' : '');
      el.textContent = label;
      el.addEventListener('click', () => {
        if (hlsInstance) hlsInstance.currentLevel = level;
        qualityBtn.textContent = '⚙ ' + label;
        qualityMenu.classList.add('hidden');
        buildQualityMenu();
      });
      qualityMenu.appendChild(el);
    };

    makeOpt('Auto', -1);
    levels.forEach((lvl, i) => {
      const label = lvl.height ? lvl.height + 'p' : Math.round(lvl.bitrate / 1000) + 'k';
      makeOpt(label, i);
    });
  }

  qualityBtn.addEventListener('click', e => {
    e.stopPropagation();
    buildQualityMenu();
    qualityMenu.classList.toggle('hidden');
  });
  document.addEventListener('click', () => qualityMenu.classList.add('hidden'));

  // --- Sync button ---
  document.getElementById('sync-btn').addEventListener('click', () => {
    if (!hlsInstance || !video) return;
    const edge = hlsInstance.liveSyncPosition;
    if (edge != null) video.currentTime = edge;
    else video.currentTime = Math.max(0, video.duration - 1);
  });

  // --- Initial status fetch ---
  fetch('/api/status').then(r => r.json()).then(d => {
    setStreamOnline(d.online, d.title);
    if (d.viewer_count > 0) viewerCount.textContent = d.viewer_count + ' watching';
  }).catch(() => {});

  // --- WebSocket ---
  let ws = null, wsReconnectTimer = null;
  const bannedUsers = new Set(), deletedMessages = new Set();

  function reconnectWS() { if (ws) ws.close(); clearTimeout(wsReconnectTimer); connectWS(); }

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws?username=${encodeURIComponent(username || randomUsername())}`);
    ws.addEventListener('message', e => { try { handleWSMessage(JSON.parse(e.data)); } catch(_) {} });
    ws.addEventListener('close', () => { wsReconnectTimer = setTimeout(connectWS, 3000); });
    ws.addEventListener('error', () => ws.close());
  }

  if (username) connectWS();

  function handleWSMessage(msg) {
    switch (msg.type) {
      case 'stream_status': handleStatus(msg.payload); break;
      case 'chat_message':  handleChatMsg(msg.payload); break;
      case 'chat_clear':    chatMessages.innerHTML = ''; break;
      case 'chat_ban':      handleBan(msg.payload.username); break;
      case 'chat_delete':   handleDelete(msg.payload.id); break;
    }
  }

  function handleStatus(p) {
    setStreamOnline(p.online, p.title);
    viewerCount.textContent = p.viewer_count > 0 ? p.viewer_count + ' watching' : '';
    if (p.online && !hlsInstance) startPlayer();
  }

  // --- Chat ---
  const chatMessages = document.getElementById('chat-messages');
  const COLORS = ['#b07d3e','#7a6fa8','#4a8fa0','#7a8f4a','#a06b6b','#6b8faa'];

  function usernameColor(u) {
    let h = 0;
    for (let i = 0; i < u.length; i++) h = h * 31 + u.charCodeAt(i);
    return COLORS[Math.abs(h) % COLORS.length];
  }

  function handleChatMsg(p) {
    if (bannedUsers.has(p.username) || deletedMessages.has(p.id)) return;
    const el = document.createElement('div');
    el.className = 'chat-msg';
    el.dataset.id = p.id;
    el.dataset.user = p.username;

    const name = document.createElement('span');
    name.className = 'chat-username';
    name.style.color = p.color || usernameColor(p.username);
    name.textContent = p.username + ':';

    const text = document.createElement('span');
    text.className = 'chat-text';
    text.textContent = p.message;

    el.appendChild(name);
    el.appendChild(text);

    const atBottom = chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 80;
    chatMessages.appendChild(el);
    while (chatMessages.children.length > 200) chatMessages.removeChild(chatMessages.firstChild);
    if (atBottom) chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function handleBan(user) {
    bannedUsers.add(user);
    chatMessages.querySelectorAll(`.chat-msg[data-user="${CSS.escape(user)}"]`).forEach(el => el.remove());
  }

  function handleDelete(id) {
    deletedMessages.add(id);
    const el = chatMessages.querySelector(`.chat-msg[data-id="${id}"]`);
    if (el) el.remove();
  }

  // --- Chat form ---
  const chatForm = document.getElementById('chat-form');
  const chatInput = document.getElementById('chat-input');
  chatForm.addEventListener('submit', e => {
    e.preventDefault();
    const text = chatInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN || bannedUsers.has(username)) return;
    ws.send(JSON.stringify({ type: 'chat_message', payload: { username, message: text } }));
    chatInput.value = '';
  });
})();
</script>
</body>
</html>
