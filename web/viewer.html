<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #2d2f3e;
    --surface: #353748;
    --surface2: #3d3f52;
    --fg: #f8f8f2;
    --muted: #6272a4;
    --purple: #bd93f9;
    --purple-soft: rgba(189,147,249,0.15);
    --green: #50fa7b;
    --pink: #ff79c6;
    --cyan: #8be9fd;
    --orange: #ffb86c;
    --yellow: #f1fa8c;
    --radius: 10px;
    --chat-w: 340px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: 'DM Sans', system-ui, sans-serif; overflow: hidden; }

  #app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* === Main column === */
  #main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    padding: 16px 0 16px 16px;
    overflow: hidden;
  }

  /* === Player === */
  #player-wrap {
    position: relative;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    width: 100%;
    aspect-ratio: 16/9;
    max-height: calc(100vh - 100px);
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }

  #player-wrap video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #000;
  }

  /* Offline overlay */
  #offline-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(45,47,62,0.92);
    gap: 12px;
    opacity: 1;
    transition: opacity 400ms ease;
  }
  #offline-overlay.hidden { opacity: 0; pointer-events: none; }

  #offline-overlay svg { opacity: 0.3; }
  #offline-label { color: var(--muted); font-size: 0.9rem; letter-spacing: 0.08em; text-transform: uppercase; }

  /* === Stream meta === */
  #stream-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 4px 0;
    flex-shrink: 0;
  }

  #live-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 400ms;
  }
  #live-dot.live {
    background: var(--green);
    animation: pulse-dot 2.4s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(0.85); }
  }

  #stream-title {
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--fg);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  #viewer-count {
    font-size: 0.8rem;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* === Chat panel === */
  #chat-panel {
    width: var(--chat-w);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 16px;
    gap: 0;
    overflow: hidden;
  }

  #chat-header {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }
  #chat-messages::-webkit-scrollbar { width: 4px; }
  #chat-messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .chat-msg {
    display: flex;
    gap: 7px;
    padding: 4px 6px;
    border-radius: 6px;
    font-size: 0.875rem;
    line-height: 1.4;
    animation: msgIn 150ms ease-in-out both;
    transition: background 200ms;
  }
  .chat-msg:hover { background: var(--purple-soft); }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .chat-username {
    font-weight: 600;
    font-size: 0.8rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .chat-text { color: var(--fg); word-break: break-word; }

  /* === Chat input === */
  #chat-input-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  #username-display {
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #change-username-btn {
    background: none;
    border: none;
    color: var(--purple);
    cursor: pointer;
    font-size: 0.72rem;
    padding: 0;
    font-family: inherit;
    opacity: 0.75;
    transition: opacity 200ms;
  }
  #change-username-btn:hover { opacity: 1; }

  #chat-form {
    display: flex;
    gap: 8px;
  }

  #chat-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--fg);
    font-family: inherit;
    font-size: 0.875rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 200ms;
  }
  #chat-input:focus { border-color: rgba(189,147,249,0.5); }
  #chat-input::placeholder { color: var(--muted); }

  #chat-send {
    background: var(--purple-soft);
    border: 1px solid rgba(189,147,249,0.3);
    border-radius: 8px;
    color: var(--purple);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 9px 14px;
    transition: background 200ms, border-color 200ms;
    white-space: nowrap;
  }
  #chat-send:hover { background: rgba(189,147,249,0.25); border-color: rgba(189,147,249,0.6); }

  /* === Username modal === */
  #username-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
    animation: fadeIn 200ms ease;
  }
  #username-modal.hidden { display: none; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  #username-dialog {
    background: var(--surface);
    border-radius: 12px;
    padding: 28px 32px;
    width: 340px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: slideUp 250ms ease;
  }

  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  #username-dialog h3 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: var(--fg); }

  #username-field {
    width: 100%;
    background: var(--bg);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--fg);
    font-family: inherit;
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 200ms;
    margin-bottom: 12px;
  }
  #username-field:focus { border-color: rgba(189,147,249,0.6); }

  #username-submit {
    width: 100%;
    background: var(--purple);
    border: none;
    border-radius: 8px;
    color: var(--bg);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 10px;
    transition: opacity 200ms;
  }
  #username-submit:hover { opacity: 0.85; }

  /* === Mobile === */
  @media (max-width: 720px) {
    html, body { overflow: auto; }
    #app { flex-direction: column; height: auto; overflow: auto; }
    #main { padding: 10px 10px 0; overflow: visible; }
    #player-wrap { max-height: none; border-radius: 8px; }
    #chat-panel { width: 100%; height: 480px; padding: 12px 10px 10px; }
    #chat-messages { height: 100%; }
  }

  /* === Banned message === */
  .banned-notice {
    padding: 8px 12px;
    border-radius: 8px;
    background: rgba(255,85,85,0.12);
    color: #ff5555;
    font-size: 0.8rem;
    text-align: center;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div id="username-modal">
  <div id="username-dialog">
    <h3>Choose a username</h3>
    <input id="username-field" type="text" placeholder="viewer_1234" maxlength="32" spellcheck="false" autocomplete="off">
    <button id="username-submit">Join chat →</button>
  </div>
</div>

<div id="app">
  <div id="main">
    <div id="player-wrap">
      <video id="video" controls playsinline></video>
      <div id="offline-overlay">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
          <circle cx="28" cy="28" r="27" stroke="#6272a4" stroke-width="1.5"/>
          <path d="M22 18l16 10-16 10V18z" fill="#6272a4"/>
        </svg>
        <span id="offline-label">Stream offline</span>
      </div>
    </div>
    <div id="stream-meta">
      <div id="live-dot"></div>
      <div id="stream-title">Loading...</div>
      <div id="viewer-count"></div>
    </div>
  </div>

  <div id="chat-panel">
    <div id="chat-header">Live chat</div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <div id="username-display">
        Chatting as <strong id="current-username-display"></strong>
        <button id="change-username-btn">change</button>
      </div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="Say something..." maxlength="300" autocomplete="off">
        <button type="submit" id="chat-send">Send</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
(function() {
  'use strict';

  // --- Username management ---
  function randomUsername() {
    return 'viewer_' + Math.floor(Math.random() * 9000 + 1000);
  }

  let username = localStorage.getItem('sluice_username');
  const modal = document.getElementById('username-modal');
  const usernameField = document.getElementById('username-field');
  const usernameSubmit = document.getElementById('username-submit');
  const currentUsernameDisplay = document.getElementById('current-username-display');

  function setUsername(name) {
    name = name.trim().replace(/[^a-zA-Z0-9_\-\.]/g, '').slice(0, 32);
    if (!name) name = randomUsername();
    username = name;
    localStorage.setItem('sluice_username', username);
    currentUsernameDisplay.textContent = username;
    modal.classList.add('hidden');
    reconnectWS();
  }

  if (!username) {
    usernameField.value = randomUsername();
    usernameField.focus();
    usernameField.select();
  } else {
    modal.classList.add('hidden');
    currentUsernameDisplay.textContent = username;
  }

  usernameSubmit.addEventListener('click', function() {
    setUsername(usernameField.value || randomUsername());
  });
  usernameField.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') setUsername(usernameField.value || randomUsername());
  });

  document.getElementById('change-username-btn').addEventListener('click', function() {
    usernameField.value = username;
    modal.classList.remove('hidden');
    usernameField.focus();
    usernameField.select();
  });

  // --- HLS player ---
  const video = document.getElementById('video');
  const offlineOverlay = document.getElementById('offline-overlay');
  const liveDot = document.getElementById('live-dot');
  const streamTitle = document.getElementById('stream-title');
  const viewerCount = document.getElementById('viewer-count');
  let hlsInstance = null;
  let streamOnline = false;

  function startPlayer() {
    const src = '/hls/live.m3u8';
    if (Hls.isSupported()) {
      if (hlsInstance) { hlsInstance.destroy(); }
      hlsInstance = new Hls({
        liveSyncDurationCount: 3,
        liveMaxLatencyDurationCount: 6,
        enableWorker: true,
        lowLatencyMode: true,
      });
      hlsInstance.loadSource(src);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play().catch(() => {});
      });
      hlsInstance.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            setTimeout(startPlayer, 5000);
          }
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = src;
      video.play().catch(() => {});
    }
  }

  function setStreamOnline(online, title) {
    streamOnline = online;
    if (online) {
      offlineOverlay.classList.add('hidden');
      liveDot.classList.add('live');
      if (!hlsInstance) startPlayer();
    } else {
      offlineOverlay.classList.remove('hidden');
      liveDot.classList.remove('live');
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    }
    if (title) streamTitle.textContent = title;
    document.title = (online ? '🔴 ' : '') + (title || 'Live Stream');
  }

  // Initial status fetch
  fetch('/api/status').then(r => r.json()).then(d => {
    setStreamOnline(d.online, d.title);
    if (d.viewer_count > 0) viewerCount.textContent = d.viewer_count + ' watching';
  }).catch(() => {});

  // --- WebSocket ---
  let ws = null;
  let wsReconnectTimer = null;
  const MAX_CHAT = 200;
  const bannedUsers = new Set();
  const deletedMessages = new Set();

  function reconnectWS() {
    if (ws) ws.close();
    clearTimeout(wsReconnectTimer);
    connectWS();
  }

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const u = username || randomUsername();
    ws = new WebSocket(`${proto}://${location.host}/ws?username=${encodeURIComponent(u)}`);

    ws.addEventListener('message', function(e) {
      try {
        const msg = JSON.parse(e.data);
        handleWSMessage(msg);
      } catch(_) {}
    });

    ws.addEventListener('close', function() {
      wsReconnectTimer = setTimeout(connectWS, 3000);
    });

    ws.addEventListener('error', function() {
      ws.close();
    });
  }

  if (username) connectWS();

  function handleWSMessage(msg) {
    switch (msg.type) {
      case 'stream_status':
        handleStatus(msg.payload);
        break;
      case 'chat_message':
        handleChatMsg(msg.payload);
        break;
      case 'chat_clear':
        clearChat();
        break;
      case 'chat_ban':
        handleBan(msg.payload.username);
        break;
      case 'chat_delete':
        handleDelete(msg.payload.id);
        break;
    }
  }

  function handleStatus(p) {
    setStreamOnline(p.online, p.title);
    if (p.viewer_count !== undefined) {
      viewerCount.textContent = p.viewer_count > 0 ? p.viewer_count + ' watching' : '';
    }
    if (p.online && !hlsInstance) startPlayer();
  }

  // --- Chat rendering ---
  const chatMessages = document.getElementById('chat-messages');

  function handleChatMsg(p) {
    if (bannedUsers.has(p.username)) return;
    if (deletedMessages.has(p.id)) return;

    const el = document.createElement('div');
    el.className = 'chat-msg';
    el.dataset.id = p.id;
    el.dataset.user = p.username;

    const nameEl = document.createElement('span');
    nameEl.className = 'chat-username';
    nameEl.style.color = p.color || '#bd93f9';
    nameEl.textContent = p.username + ':';

    const textEl = document.createElement('span');
    textEl.className = 'chat-text';
    textEl.textContent = p.message;

    el.appendChild(nameEl);
    el.appendChild(textEl);

    const wasAtBottom = chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 80;
    chatMessages.appendChild(el);

    // Trim old messages
    while (chatMessages.children.length > MAX_CHAT) {
      chatMessages.removeChild(chatMessages.firstChild);
    }

    if (wasAtBottom) {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
  }

  function clearChat() {
    chatMessages.innerHTML = '';
  }

  function handleBan(user) {
    bannedUsers.add(user);
    document.querySelectorAll(`.chat-msg[data-user="${CSS.escape(user)}"]`).forEach(el => el.remove());
  }

  function handleDelete(id) {
    deletedMessages.add(id);
    const el = chatMessages.querySelector(`.chat-msg[data-id="${id}"]`);
    if (el) el.remove();
  }

  // --- Chat form ---
  const chatForm = document.getElementById('chat-form');
  const chatInput = document.getElementById('chat-input');

  chatForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const text = chatInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    if (bannedUsers.has(username)) return;

    ws.send(JSON.stringify({
      type: 'chat_message',
      payload: { username: username, message: text }
    }));
    chatInput.value = '';
  });

})();
</script>
</body>
</html>
