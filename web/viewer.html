<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-sans/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-mono/style.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #09090b;
    --card:     #0e0e11;
    --surface:  #18181b;
    --surface2: #27272a;
    --border:   #27272a;
    --text:     #fafafa;
    --text2:    #e4e4e7;
    --muted:    #71717a;
    --live:     #4ade80;
    --chat-w:   280px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* === Main column === */
  #main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    padding: 20px 0 20px 20px;
    overflow: hidden;
  }

  /* === Player === */
  #player-wrap {
    position: relative;
    background: #09090b;
    overflow: hidden;
    width: 100%;
    aspect-ratio: 16/9;
    max-height: calc(100vh - 100px);
    flex-shrink: 0;
  }

  #player-wrap video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #09090b;
  }

  #offline-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #09090b;
    gap: 12px;
    opacity: 1;
    transition: opacity 200ms linear;
  }
  #offline-overlay.hidden { opacity: 0; pointer-events: none; }

  #offline-label {
    color: #3f3f46;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-family: 'Geist Mono', 'JetBrains Mono', monospace;
  }

  /* === Stream meta === */
  #stream-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 2px 0;
    margin-top: 8px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #live-dot {
    width: 6px;
    height: 6px;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 300ms linear;
  }
  #live-dot.live {
    background: var(--live);
    animation: pulse-dot 2.6s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  #stream-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  #viewer-count {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.06em;
  }

  /* === Sync button === */
  #sync-btn {
    display: none;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 3px 9px;
    cursor: pointer;
    transition: color 150ms ease;
    flex-shrink: 0;
  }
  #sync-btn:hover { color: var(--text); }
  #sync-btn.visible { display: block; }

  /* === Quality picker === */
  #quality-wrap { position: relative; flex-shrink: 0; }

  #quality-btn {
    display: none;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 3px 9px;
    cursor: pointer;
    transition: color 150ms ease;
  }
  #quality-btn:hover { color: var(--text); }
  #quality-btn.visible { display: block; }

  #quality-menu {
    position: absolute;
    bottom: calc(100% + 4px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    min-width: 120px;
    z-index: 50;
  }
  #quality-menu.hidden { display: none; }

  .quality-option {
    padding: 7px 12px;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    font-family: inherit;
    border-bottom: 1px solid var(--border);
    transition: background 150ms ease;
  }
  .quality-option:last-child { border-bottom: none; }
  .quality-option:hover { background: var(--surface2); }
  .quality-option.active { color: var(--text); }

  /* === Chat panel === */
  #chat-panel {
    width: var(--chat-w);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 16px;
    background: var(--card);
    border-left: 1px solid var(--border);
    overflow: hidden;
  }

  #chat-header {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #chat-header .arrow { margin-right: 6px; }

  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
    display: flex;
    flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }
  #chat-messages::-webkit-scrollbar { width: 3px; }
  #chat-messages::-webkit-scrollbar-thumb { background: var(--surface2); }

  .chat-msg {
    display: flex;
    gap: 6px;
    padding: 5px 4px;
    font-size: 13px;
    font-family: 'Geist', system-ui, sans-serif;
    line-height: 1.45;
    animation: msgIn 120ms linear both;
    transition: background 150ms ease;
  }
  .chat-msg:hover { background: var(--surface); }

  @keyframes msgIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .chat-username {
    font-family: 'Geist Mono', 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .chat-text { color: var(--text); word-break: break-word; }

  /* === Chat input === */
  #chat-input-area {
    display: flex;
    flex-direction: column;
    gap: 7px;
    flex-shrink: 0;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  #username-display {
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.04em;
  }
  #change-username-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 10px;
    padding: 0;
    font-family: inherit;
    transition: color 150ms ease;
  }
  #change-username-btn:hover { color: var(--text); }

  #chat-form { display: flex; }

  #chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-right: none;
    border-top-left-radius: 6px;
    border-bottom-left-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 150ms ease;
  }
  #chat-input:focus { border-color: var(--text); }
  #chat-input::placeholder { color: var(--muted); }

  #chat-send {
    background: var(--text);
    border: none;
    border-top-right-radius: 6px;
    border-bottom-right-radius: 6px;
    color: var(--bg);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 13px;
    transition: opacity 150ms ease;
    white-space: nowrap;
  }
  #chat-send:hover { opacity: 0.85; }

  /* === Username modal === */
  #username-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 100ms linear;
  }
  #username-modal.hidden { display: none; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  #username-dialog {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
    width: 320px;
  }

  #username-dialog h3 {
    font-size: 11px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 14px;
  }

  #username-field {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 150ms ease;
    margin-bottom: 10px;
  }
  #username-field:focus { border-color: var(--text); }

  #username-submit {
    width: 100%;
    background: var(--text);
    border: none;
    border-radius: 6px;
    color: var(--bg);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 9px;
    transition: opacity 150ms ease;
  }
  #username-submit:hover { opacity: 0.85; }

  /* === Mobile === */
  @media (max-width: 720px) {
    html, body { overflow: auto; }
    #app { flex-direction: column; height: auto; overflow: auto; }
    #main { padding: 12px 12px 0; overflow: visible; }
    #player-wrap { max-height: none; }
    #chat-panel { width: 100%; height: 440px; padding: 12px; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div id="username-modal">
  <div id="username-dialog">
    <h3>Choose a username</h3>
    <input id="username-field" type="text" placeholder="viewer_1234" maxlength="32" spellcheck="false" autocomplete="off">
    <button id="username-submit">Join chat →</button>
  </div>
</div>

<div id="app">
  <div id="main">
    <div id="player-wrap">
      <video id="video" controls playsinline></video>
      <div id="offline-overlay">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 44" width="40" height="44">
          <polyline points="8,6 22,22 8,38"  fill="none" stroke="#3f3f46" stroke-width="2.5" stroke-linejoin="miter" stroke-linecap="square"/>
          <polyline points="20,6 34,22 20,38" fill="none" stroke="#5a7a95" stroke-width="2.5" stroke-linejoin="miter" stroke-linecap="square"/>
        </svg>
        <span id="offline-label">Stream offline</span>
      </div>
    </div>
    <div id="stream-meta">
      <div id="live-dot"></div>
      <div id="stream-title">Loading...</div>
      <div id="viewer-count"></div>
      <button id="sync-btn" title="Sync to live edge">↺ Live</button>
      <div id="quality-wrap">
        <button id="quality-btn" title="Quality">Auto</button>
        <div id="quality-menu" class="hidden"></div>
      </div>
    </div>
  </div>

  <div id="chat-panel">
    <div id="chat-header"><span class="arrow">→</span>Live chat</div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <div id="username-display">
        Chatting as <strong id="current-username-display"></strong>
        <button id="change-username-btn">change</button>
      </div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="Say something..." maxlength="300" autocomplete="off">
        <button type="submit" id="chat-send">→ Send</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
(function() {
  'use strict';

  // --- Username ---
  function randomUsername() { return 'viewer_' + Math.floor(Math.random() * 9000 + 1000); }

  let username = localStorage.getItem('relay_username');
  const modal = document.getElementById('username-modal');
  const usernameField = document.getElementById('username-field');
  const currentUsernameDisplay = document.getElementById('current-username-display');

  function setUsername(name) {
    name = name.trim().replace(/[^a-zA-Z0-9_\-\.]/g, '').slice(0, 32) || randomUsername();
    username = name;
    localStorage.setItem('relay_username', username);
    currentUsernameDisplay.textContent = username;
    modal.classList.add('hidden');
    reconnectWS();
  }

  if (!username) {
    usernameField.value = randomUsername();
    usernameField.focus();
    usernameField.select();
  } else {
    modal.classList.add('hidden');
    currentUsernameDisplay.textContent = username;
  }

  document.getElementById('username-submit').addEventListener('click', () => setUsername(usernameField.value || randomUsername()));
  usernameField.addEventListener('keydown', e => { if (e.key === 'Enter') setUsername(usernameField.value || randomUsername()); });
  document.getElementById('change-username-btn').addEventListener('click', () => {
    usernameField.value = username;
    modal.classList.remove('hidden');
    usernameField.focus();
    usernameField.select();
  });

  // --- Player ---
  const video = document.getElementById('video');
  const offlineOverlay = document.getElementById('offline-overlay');
  const liveDot = document.getElementById('live-dot');
  const streamTitle = document.getElementById('stream-title');
  const viewerCount = document.getElementById('viewer-count');
  let hlsInstance = null;

  function startPlayer() {
    const src = '/hls/live.m3u8';
    if (Hls.isSupported()) {
      if (hlsInstance) hlsInstance.destroy();
      hlsInstance = new Hls({ liveSyncDurationCount: 3, liveMaxLatencyDurationCount: 6, enableWorker: true, lowLatencyMode: true });
      hlsInstance.loadSource(src);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => {});
        buildQualityMenu();
      });
      hlsInstance.on(Hls.Events.ERROR, (e, d) => { if (d.fatal && d.type === Hls.ErrorTypes.NETWORK_ERROR) setTimeout(startPlayer, 5000); });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = src;
      video.play().catch(() => {});
    }
  }

  function setStreamOnline(online, title) {
    if (online) {
      offlineOverlay.classList.add('hidden');
      liveDot.classList.add('live');
      document.getElementById('sync-btn').classList.add('visible');
      document.getElementById('quality-btn').classList.add('visible');
      if (!hlsInstance) startPlayer();
    } else {
      offlineOverlay.classList.remove('hidden');
      liveDot.classList.remove('live');
      document.getElementById('sync-btn').classList.remove('visible');
      document.getElementById('quality-btn').classList.remove('visible');
      document.getElementById('quality-menu').classList.add('hidden');
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    }
    if (title) { streamTitle.textContent = title; document.title = (online ? '● ' : '') + title; }
  }

  // --- Quality picker ---
  const qualityBtn  = document.getElementById('quality-btn');
  const qualityMenu = document.getElementById('quality-menu');

  function buildQualityMenu() {
    qualityMenu.innerHTML = '';
    const levels = hlsInstance ? hlsInstance.levels : [];
    const current = hlsInstance ? hlsInstance.currentLevel : -1;

    const makeOpt = (label, level) => {
      const el = document.createElement('div');
      el.className = 'quality-option' + (current === level ? ' active' : '');
      el.textContent = label;
      el.addEventListener('click', () => {
        if (hlsInstance) hlsInstance.currentLevel = level;
        qualityBtn.textContent = label;
        qualityMenu.classList.add('hidden');
        buildQualityMenu();
      });
      qualityMenu.appendChild(el);
    };

    makeOpt('Auto', -1);
    levels.forEach((lvl, i) => {
      const label = lvl.height > 0 ? lvl.height + 'p'
                  : lvl.bitrate > 0 ? Math.round(lvl.bitrate / 1000) + 'k'
                  : 'Original';
      makeOpt(label, i);
    });
  }

  qualityBtn.addEventListener('click', e => {
    e.stopPropagation();
    buildQualityMenu();
    qualityMenu.classList.toggle('hidden');
  });
  document.addEventListener('click', () => qualityMenu.classList.add('hidden'));

  // --- Sync button ---
  document.getElementById('sync-btn').addEventListener('click', () => {
    if (!hlsInstance || !video) return;
    const edge = hlsInstance.liveSyncPosition;
    if (edge != null) video.currentTime = edge;
    else video.currentTime = Math.max(0, video.duration - 1);
  });

  // --- Initial status fetch ---
  fetch('/api/status').then(r => r.json()).then(d => {
    setStreamOnline(d.online, d.title);
    if (d.viewer_count > 0) viewerCount.textContent = d.viewer_count + ' watching';
  }).catch(() => {});

  // --- WebSocket ---
  let ws = null, wsReconnectTimer = null;
  const bannedUsers = new Set(), deletedMessages = new Set();

  function reconnectWS() { if (ws) ws.close(); clearTimeout(wsReconnectTimer); connectWS(); }

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws?username=${encodeURIComponent(username || randomUsername())}`);
    ws.addEventListener('message', e => { try { handleWSMessage(JSON.parse(e.data)); } catch(_) {} });
    ws.addEventListener('close', () => { wsReconnectTimer = setTimeout(connectWS, 3000); });
    ws.addEventListener('error', () => ws.close());
  }

  if (username) connectWS();

  function handleWSMessage(msg) {
    switch (msg.type) {
      case 'stream_status': handleStatus(msg.payload); break;
      case 'chat_message':  handleChatMsg(msg.payload); break;
      case 'chat_clear':    chatMessages.innerHTML = ''; break;
      case 'chat_ban':      handleBan(msg.payload.username); break;
      case 'chat_delete':   handleDelete(msg.payload.id); break;
    }
  }

  function handleStatus(p) {
    setStreamOnline(p.online, p.title);
    viewerCount.textContent = p.viewer_count > 0 ? p.viewer_count + ' watching' : '';
    if (p.online && !hlsInstance) startPlayer();
  }

  // --- Chat ---
  const chatMessages = document.getElementById('chat-messages');
  const COLORS = ['#f59e0b','#8b5cf6','#06b6d4','#10b981','#f43f5e','#3b82f6'];

  function usernameColor(u) {
    let h = 0;
    for (let i = 0; i < u.length; i++) h = h * 31 + u.charCodeAt(i);
    return COLORS[Math.abs(h) % COLORS.length];
  }

  function handleChatMsg(p) {
    if (bannedUsers.has(p.username) || deletedMessages.has(p.id)) return;
    const el = document.createElement('div');
    el.className = 'chat-msg';
    el.dataset.id = p.id;
    el.dataset.user = p.username;

    const name = document.createElement('span');
    name.className = 'chat-username';
    name.style.color = p.color || usernameColor(p.username);
    name.textContent = p.username + ':';

    const text = document.createElement('span');
    text.className = 'chat-text';
    text.textContent = p.message;

    el.appendChild(name);
    el.appendChild(text);

    const atBottom = chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 80;
    chatMessages.appendChild(el);
    while (chatMessages.children.length > 200) chatMessages.removeChild(chatMessages.firstChild);
    if (atBottom) chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function handleBan(user) {
    bannedUsers.add(user);
    chatMessages.querySelectorAll(`.chat-msg[data-user="${CSS.escape(user)}"]`).forEach(el => el.remove());
  }

  function handleDelete(id) {
    deletedMessages.add(id);
    const el = chatMessages.querySelector(`.chat-msg[data-id="${id}"]`);
    if (el) el.remove();
  }

  // --- Chat form ---
  const chatForm = document.getElementById('chat-form');
  const chatInput = document.getElementById('chat-input');
  chatForm.addEventListener('submit', e => {
    e.preventDefault();
    const text = chatInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN || bannedUsers.has(username)) return;
    ws.send(JSON.stringify({ type: 'chat_message', payload: { username, message: text } }));
    chatInput.value = '';
  });
})();
</script>
</body>
</html>
