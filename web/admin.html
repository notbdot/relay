<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay — Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-sans/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-mono/style.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #09090b;
    --card:    #0e0e11;
    --surface: #18181b;
    --surface2: #27272a;
    --border:  #27272a;
    --text:    #fafafa;
    --text2:   #e4e4e7;
    --muted:   #71717a;
    --muted2:  #52525b;
    --live:    #4ade80;
    --err:     #f87171;
    --warn:    #facc15;
  }

  html {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; }

  #app { max-width: 1200px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  #topbar { padding: 8px 0 4px; }

  /* --- Stat cards --- */
  #statusbar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .sb-cell {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sb-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .sb-value { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; font-family: 'Geist Mono', 'JetBrains Mono', monospace; }

  #status-indicator { color: var(--err); }
  #status-indicator.live { color: var(--live); }
  #uptime-val, #bitrate-val, #viewers-val { color: var(--text); }

  /* --- Section cards --- */
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .section-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* --- Preview monitors --- */
  #preview-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 16px; }
  .preview-pane { display: flex; flex-direction: column; gap: 6px; }
  .preview-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .preview-wrap {
    position: relative;
    background: #000;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    border-radius: 4px;
  }
  .preview-wrap video { width: 100%; height: 100%; display: block; object-fit: contain; }
  .preview-offline {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
    transition: opacity 200ms ease;
  }
  .preview-offline.hidden { opacity: 0; pointer-events: none; }
  .preview-offline span { color: var(--muted2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* --- Sparkline --- */
  #sparkline-body { padding: 12px 16px 14px; }
  #sparkline-wrap { position: relative; height: 56px; }
  #sparkline-svg { width: 100%; height: 56px; }
  #sparkline-zero { position: absolute; bottom: 0; left: 0; font-size: 10px; color: var(--muted); font-family: 'Geist Mono', monospace; }
  #sparkline-peak { position: absolute; top: 0; left: 0; font-size: 10px; color: var(--muted); font-family: 'Geist Mono', monospace; }

  /* --- Two-column --- */
  #columns { display: grid; grid-template-columns: 55fr 45fr; gap: 8px; }
  #columns > * {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  #col-right { display: flex; flex-direction: column; overflow-y: auto; }

  /* --- Chat --- */
  #chat-section { display: flex; flex-direction: column; }
  #chat-log {
    flex: 1;
    min-height: 360px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }
  #chat-log::-webkit-scrollbar { width: 3px; }
  #chat-log::-webkit-scrollbar-thumb { background: var(--surface2); }

  .chat-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 150ms ease;
  }
  .chat-row:hover { background: var(--surface); }
  .chat-row.deleted { opacity: 0.25; text-decoration: line-through; }
  .chat-row.banned-msg { opacity: 0.2; }

  .chat-ts   { color: var(--muted); font-size: 11px; white-space: nowrap; padding-top: 1px; width: 40px; flex-shrink: 0; font-family: 'Geist Mono', monospace; }
  .chat-user { font-weight: 500; white-space: nowrap; flex-shrink: 0; min-width: 90px; font-family: 'Geist Mono', monospace; font-size: 12px; }
  .chat-text { flex: 1; color: var(--text2); word-break: break-word; }

  .chat-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 150ms ease; }
  .chat-row:hover .chat-actions { opacity: 1; }

  .act-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    padding: 2px 6px;
    transition: all 150ms ease;
  }
  .act-btn.del:hover { color: var(--warn); border-color: #78350f; background: #422006; }
  .act-btn.ban:hover { color: var(--err);  border-color: #7f1d1d; background: #450a0a; }

  /* --- Admin send --- */
  .admin-send-row {
    display: flex;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .admin-msg-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
  }
  .admin-msg-input::placeholder { color: var(--muted); }
  .admin-send-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    padding: 10px 14px;
    transition: color 150ms ease;
  }
  .admin-send-btn:hover { color: var(--text); }

  /* --- Config --- */
  .config-form { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }

  .field-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    width: 100%;
    transition: border-color 150ms ease;
  }
  .field-input:focus { border-color: var(--text); }
  select.field-input { appearance: none; cursor: pointer; }

  .field-row { display: flex; align-items: stretch; }
  .key-mask { flex: 1; border-top-right-radius: 0; border-bottom-right-radius: 0; }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-left: none;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    padding: 0 12px;
    transition: all 150ms ease;
    white-space: nowrap;
  }
  .icon-btn:last-child { border-top-right-radius: 6px; border-bottom-right-radius: 6px; }
  .icon-btn:hover { background: var(--surface); color: var(--text); }

  .save-row { display: flex; align-items: center; gap: 12px; }
  .save-btn {
    background: var(--text);
    border: none;
    border-radius: 6px;
    color: var(--bg);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    transition: opacity 150ms ease;
  }
  .save-btn:hover { opacity: 0.85; }
  .save-status { font-size: 12px; color: var(--live); opacity: 0; transition: opacity 250ms; }
  .save-status.show { opacity: 1; }

  /* --- Stream control --- */
  .control-row { padding: 14px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* --- Sessions --- */
  #session-table { width: 100%; border-collapse: collapse; }
  #session-table th {
    text-align: left;
    padding: 10px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-weight: 500;
    background: var(--card);
  }
  #session-table td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text2);
    font-family: 'Geist Mono', monospace;
  }
  .session-row:hover { background: var(--surface); }

  /* --- Buttons --- */
  .text-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    padding: 6px 12px;
    transition: all 150ms ease;
  }
  .text-btn:hover { background: var(--surface); color: var(--text); border-color: var(--surface2); }
  .text-btn.danger:hover { color: var(--err);  border-color: #7f1d1d; background: #450a0a; }
  .text-btn.warn:hover   { color: var(--warn); border-color: #78350f; background: #422006; }

  /* --- OBS --- */
  .obs-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--muted2); transition: background 200ms; }
  .obs-dot.live { background: var(--live); }
  .obs-controls { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .obs-btn-row { display: flex; gap: 8px; }
  .obs-btn-row .text-btn { flex: 1; }
  .d-none { display: none !important; }

  @media (max-width: 900px) {
    #columns { grid-template-columns: 1fr; }
    #statusbar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 44" width="111" height="33">
      <polyline points="8,6 22,22 8,38"  fill="none" stroke="#fafafa" stroke-width="2.5" stroke-linejoin="miter" stroke-linecap="square"/>
      <polyline points="20,6 34,22 20,38" fill="none" stroke="#5a7a95" stroke-width="2.5" stroke-linejoin="miter" stroke-linecap="square"/>
      <text x="50" y="29" font-family="'Geist','system-ui',sans-serif" font-size="18" font-weight="700" fill="#fafafa" letter-spacing="0.12em">RELAY</text>
    </svg>
  </div>

  <div id="statusbar">
    <div class="sb-cell">
      <span class="sb-label">Status</span>
      <span class="sb-value" id="status-indicator">OFFLINE</span>
    </div>
    <div class="sb-cell">
      <span class="sb-label">Uptime</span>
      <span class="sb-value" id="uptime-val">--:--:--</span>
    </div>
    <div class="sb-cell">
      <span class="sb-label">Bitrate</span>
      <span class="sb-value" id="bitrate-val">—</span>
    </div>
    <div class="sb-cell">
      <span class="sb-label">Viewers</span>
      <span class="sb-value" id="viewers-val">0</span>
    </div>
    <div class="sb-cell">
      <span class="sb-label">Title</span>
      <span class="sb-value" id="title-val" style="font-size:14px;font-weight:400;color:var(--muted);font-family:'Geist',sans-serif">—</span>
    </div>
  </div>

  <div id="columns">
    <div id="chat-section">
      <div class="section-header">
        <span>Chat monitor</span>
        <button class="text-btn danger" id="clear-chat-btn">Clear all</button>
      </div>
      <div id="chat-log"></div>
      <div class="admin-send-row">
        <input class="admin-msg-input" id="admin-msg" placeholder="Send as [admin]..." maxlength="300">
        <button class="admin-send-btn" id="admin-send-btn">Send →</button>
      </div>
    </div>

    <div id="col-right">

      <div>
        <div class="section-header">Monitor</div>
        <div id="preview-row">
          <div class="preview-pane">
            <div class="preview-label">Camera</div>
            <div class="preview-wrap">
              <video id="cam-video" autoplay muted playsinline></video>
              <div class="preview-offline" id="cam-offline"><span>Offline</span></div>
            </div>
          </div>
          <div class="preview-pane">
            <div class="preview-label">Viewer</div>
            <div class="preview-wrap">
              <video id="viewer-video" autoplay muted playsinline></video>
              <div class="preview-offline" id="viewer-offline"><span>Offline</span></div>
            </div>
          </div>
        </div>
      </div>

      <div style="border-top: 1px solid var(--border)">
        <div class="section-header">
          <span>Bitrate · last 5 min</span>
          <span id="sparkline-cur" style="color:var(--muted);font-family:'Geist Mono',monospace">—</span>
        </div>
        <div id="sparkline-body">
          <div id="sparkline-wrap">
            <svg id="sparkline-svg" preserveAspectRatio="none" viewBox="0 0 300 56"></svg>
            <span id="sparkline-zero">0</span>
            <span id="sparkline-peak"></span>
          </div>
        </div>
      </div>

      <div style="border-top: 1px solid var(--border)">
        <div class="section-header">Configuration</div>
        <div class="config-form">
          <div class="field-group">
            <label class="field-label">Stream title</label>
            <input class="field-input" id="cfg-title" type="text" placeholder="My Stream" spellcheck="false">
          </div>
          <div class="field-group">
            <label class="field-label">Stream key — paste into OBS Stream ID field</label>
            <div class="field-row">
              <input class="field-input key-mask" id="cfg-key" type="text" placeholder="XXXX-XXXX-XXXX" spellcheck="false" autocomplete="off">
              <button class="icon-btn" id="reveal-key-btn">Hide</button>
              <button class="icon-btn" id="regen-key-btn">Regen</button>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Output quality</label>
            <select class="field-input" id="cfg-quality">
              <option value="source">Source (pass-through)</option>
              <option value="1080p">1080p — 4 Mbps</option>
              <option value="720p">720p — 2.5 Mbps</option>
              <option value="480p">480p — 1 Mbps</option>
              <option value="360p">360p — 500 kbps</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">FFmpeg extra flags</label>
            <input class="field-input" id="cfg-ffmpeg" type="text" placeholder="-vf scale=1280:720" spellcheck="false">
          </div>
          <div class="save-row">
            <button class="save-btn" id="save-cfg-btn">Save</button>
            <span class="save-status" id="save-status">Saved.</span>
          </div>
        </div>
      </div>

      <div style="border-top: 1px solid var(--border)">
        <div class="section-header">Stream control</div>
        <div class="control-row">
          <button class="text-btn warn" id="restart-stream-btn">Restart ingest</button>
          <span style="color:var(--muted);font-size:12px">Kills and restarts the FFmpeg SRT listener</span>
        </div>
      </div>

      <div style="border-top: 1px solid var(--border)">
        <div class="section-header">
          <span>OBS Control</span>
          <span id="obs-dot" class="obs-dot"></span>
        </div>
        <div id="obs-connect-form" class="config-form">
          <div class="field-group">
            <label class="field-label">OBS WebSocket URL</label>
            <input class="field-input" id="obs-url" type="text" value="ws://localhost:4455" spellcheck="false" placeholder="ws://192.168.x.x:4455">
          </div>
          <div class="field-group">
            <label class="field-label">Password</label>
            <input class="field-input" id="obs-password" type="password" placeholder="(leave blank if none)">
          </div>
          <div class="save-row">
            <button class="save-btn" id="obs-connect-btn">Connect</button>
            <span class="save-status" id="obs-error" style="color:var(--err)"></span>
          </div>
        </div>
        <div id="obs-controls" class="obs-controls d-none">
          <div class="obs-btn-row">
            <button class="text-btn" id="obs-stream-btn">Start Stream</button>
            <button class="text-btn" id="obs-record-btn">Start Record</button>
          </div>
          <div class="field-group">
            <label class="field-label">Scene</label>
            <select class="field-input" id="obs-scene-select"></select>
          </div>
          <button class="text-btn" id="obs-disconnect-btn">Disconnect</button>
        </div>
      </div>

    </div>
  </div>

  <div class="section">
    <div class="section-header">Recent sessions</div>
    <table id="session-table">
      <thead>
        <tr>
          <th>#</th><th>Started</th><th>Duration</th><th>Peak viewers</th><th>End reason</th>
        </tr>
      </thead>
      <tbody id="session-body"></tbody>
    </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
(function() {
  'use strict';

  // --- WebSocket ---
  let ws = null, wsReconnect = null;
  const bitrateHistory = new Array(300).fill(0);

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws?admin=1&username=%5Badmin%5D`);
    ws.addEventListener('message', e => { try { handleMsg(JSON.parse(e.data)); } catch(_) {} });
    ws.addEventListener('close',   () => { wsReconnect = setTimeout(connectWS, 3000); });
    ws.addEventListener('error',   () => ws.close());
  }
  connectWS();

  // --- Status ---
  const statusEl  = document.getElementById('status-indicator');
  const uptimeEl  = document.getElementById('uptime-val');
  const bitrateEl = document.getElementById('bitrate-val');
  const viewersEl = document.getElementById('viewers-val');
  const titleEl   = document.getElementById('title-val');
  let streamUptimeS = 0, timerInt = null;

  function handleMsg(msg) {
    switch(msg.type) {
      case 'stream_status': updateStatus(msg.payload); break;
      case 'chat_message':  appendChatRow(msg.payload); break;
      case 'chat_clear':    document.getElementById('chat-log').innerHTML = ''; break;
      case 'chat_ban':      markBanned(msg.payload.username); break;
      case 'chat_delete':   markDeleted(msg.payload.id); break;
    }
  }

  function updateStatus(p) {
    streamUptimeS = p.uptime_s || 0;
    statusEl.textContent = p.online ? 'LIVE' : 'OFFLINE';
    statusEl.classList.toggle('live', p.online);
    bitrateEl.textContent = p.online ? Math.round(p.bitrate_kbps) + ' kbps' : '—';
    viewersEl.textContent = p.viewer_count || 0;
    if (p.title) titleEl.textContent = p.title;

    bitrateHistory.shift();
    bitrateHistory.push(p.online ? (p.bitrate_kbps || 0) : 0);
    drawSparkline();

    clearInterval(timerInt);
    if (p.online) {
      uptimeEl.textContent = formatUptime(streamUptimeS);
      timerInt = setInterval(() => { uptimeEl.textContent = formatUptime(++streamUptimeS); }, 1000);
    } else {
      uptimeEl.textContent = '--:--:--';
    }

    updatePreviews(p.online);
  }

  function formatUptime(s) {
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  // --- Preview players ---
  const camVideo     = document.getElementById('cam-video');
  const camOffline   = document.getElementById('cam-offline');
  const viewerVideo  = document.getElementById('viewer-video');
  const viewerOffline = document.getElementById('viewer-offline');
  let camHls = null, viewerHls = null;

  function makeHls(videoEl, src) {
    if (typeof Hls === 'undefined' || !Hls.isSupported()) return null;
    const h = new Hls({ liveSyncDurationCount: 3, enableWorker: true, lowLatencyMode: true });
    h.loadSource(src);
    h.attachMedia(videoEl);
    h.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play().catch(() => {}));
    return h;
  }

  function startCam()    { if (!camHls)    camHls    = makeHls(camVideo,    '/hls/camera/live.m3u8'); }
  function startViewer() { if (!viewerHls) viewerHls = makeHls(viewerVideo, '/hls/live.m3u8'); }

  function updatePreviews(isOnline) {
    if (isOnline) {
      viewerOffline.classList.add('hidden');
      startViewer();
    } else {
      viewerOffline.classList.remove('hidden');
      if (viewerHls) { viewerHls.destroy(); viewerHls = null; }
    }
  }

  function initCameraPreview() {
    camHls = makeHls(camVideo, '/hls/camera/live.m3u8');
    if (!camHls) return;
    camHls.on(Hls.Events.ERROR, (_, d) => {
      if (d.fatal && d.type === Hls.ErrorTypes.NETWORK_ERROR) {
        camOffline.classList.remove('hidden');
        camHls.destroy(); camHls = null;
        setTimeout(initCameraPreview, 5000);
      }
    });
    camHls.on(Hls.Events.MANIFEST_PARSED, () => {
      camOffline.classList.add('hidden');
      camVideo.play().catch(() => {});
    });
  }
  initCameraPreview();

  // --- Sparkline ---
  const sparkSVG  = document.getElementById('sparkline-svg');
  const sparkPeak = document.getElementById('sparkline-peak');
  const sparkCur  = document.getElementById('sparkline-cur');

  function drawSparkline() {
    const W = 300, H = 56;
    const peak = Math.max(...bitrateHistory, 100);
    sparkPeak.textContent = Math.round(peak) + ' kbps';
    const cur = bitrateHistory[bitrateHistory.length - 1];
    sparkCur.textContent = cur > 0 ? Math.round(cur) + ' kbps' : '—';

    if (bitrateHistory.every(v => v === 0)) {
      sparkSVG.innerHTML = `<line x1="0" y1="${H-1}" x2="${W}" y2="${H-1}" stroke="#27272a" stroke-width="1" stroke-dasharray="3,3"/>`;
      return;
    }

    const pts = bitrateHistory.map((v, i) => {
      const x = (i / (bitrateHistory.length - 1)) * W;
      const y = H - 2 - (v / peak) * (H - 8);
      return `${x},${y}`;
    }).join(' ');

    sparkSVG.innerHTML = `
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="5%"  stop-color="#fafafa" stop-opacity="0.15"/>
          <stop offset="95%" stop-color="#fafafa" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polygon points="0,${H} ${pts} ${W},${H}" fill="url(#sg)"/>
      <polyline points="${pts}" fill="none" stroke="#fafafa" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    `;
  }

  fetch('/api/bitrate-history').then(r => r.json()).then(hist => {
    if (!Array.isArray(hist)) return;
    const n = Math.min(hist.length, 300);
    for (let i = 0; i < n; i++) bitrateHistory[300 - n + i] = hist[i];
    drawSparkline();
  }).catch(() => {});

  // --- Chat ---
  const chatLog = document.getElementById('chat-log');
  const renderedIDs = new Set();

  fetch('/api/admin/chat/all?limit=100').then(r => r.json()).then(msgs => {
    if (!Array.isArray(msgs)) return;
    msgs.forEach(m => appendChatRow(m, true));
  }).catch(() => {});

  function appendChatRow(p, historic) {
    if (p.id && renderedIDs.has(p.id)) return;
    if (p.id) renderedIDs.add(p.id);
    const row = document.createElement('div');
    row.className = 'chat-row';
    row.dataset.id = p.id;
    row.dataset.user = p.username;
    if (p.is_deleted) row.classList.add('deleted');
    if (p.is_banned)  row.classList.add('banned-msg');

    const ts = new Date((p.timestamp || 0) * 1000);
    const tsStr = String(ts.getHours()).padStart(2,'0') + ':' + String(ts.getMinutes()).padStart(2,'0');

    row.innerHTML = `
      <span class="chat-ts">${tsStr}</span>
      <span class="chat-user" style="color:${p.color||'var(--muted)'}">${esc(p.username)}</span>
      <span class="chat-text">${esc(p.message)}</span>
      <span class="chat-actions">
        <button class="act-btn del" data-id="${p.id}">del</button>
        <button class="act-btn ban" data-user="${esc(p.username)}">ban</button>
      </span>`;

    const atBottom = chatLog.scrollHeight - chatLog.scrollTop - chatLog.clientHeight < 80;
    chatLog.appendChild(row);
    while (chatLog.children.length > 500) chatLog.removeChild(chatLog.firstChild);
    if (!historic && atBottom) chatLog.scrollTop = chatLog.scrollHeight;
    if (historic) chatLog.scrollTop = chatLog.scrollHeight;
  }

  function markDeleted(id) {
    chatLog.querySelector(`.chat-row[data-id="${id}"]`)?.classList.add('deleted');
  }
  function markBanned(user) {
    chatLog.querySelectorAll(`.chat-row[data-user="${CSS.escape(user)}"]`).forEach(el => el.classList.add('banned-msg'));
  }

  chatLog.addEventListener('click', e => {
    const del = e.target.closest('.act-btn.del');
    const ban = e.target.closest('.act-btn.ban');
    if (del) {
      const id = parseInt(del.dataset.id);
      post('/api/admin/chat/delete', { id }).then(() => markDeleted(id));
    }
    if (ban) {
      const user = ban.dataset.user;
      if (confirm(`Ban "${user}"?`)) post('/api/admin/chat/ban', { username: user }).then(() => markBanned(user));
    }
  });

  document.getElementById('clear-chat-btn').addEventListener('click', () => {
    if (confirm('Clear all chat messages?')) post('/api/admin/chat/clear', {}).then(() => chatLog.innerHTML = '');
  });

  const adminMsgInput = document.getElementById('admin-msg');
  function sendAdminMsg() {
    const text = adminMsgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'chat_message', payload: { username: '[admin]', message: text } }));
    adminMsgInput.value = '';
  }
  document.getElementById('admin-send-btn').addEventListener('click', sendAdminMsg);
  adminMsgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendAdminMsg(); });

  // --- Config ---
  const cfgTitle   = document.getElementById('cfg-title');
  const cfgKey     = document.getElementById('cfg-key');
  const cfgFFmpeg  = document.getElementById('cfg-ffmpeg');
  const cfgQuality = document.getElementById('cfg-quality');

  const obsUrlEl = document.getElementById('obs-url');

  fetch('/api/admin/config').then(r => r.json()).then(d => {
    if (d.stream_title)   cfgTitle.value   = d.stream_title;
    if (d.stream_key)     cfgKey.value     = d.stream_key;
    if (d.ffmpeg_flags)   cfgFFmpeg.value  = d.ffmpeg_flags;
    if (d.quality_preset) cfgQuality.value = d.quality_preset;
    if (d.obs_ws_url)     obsUrlEl.value   = d.obs_ws_url;
  }).catch(() => {});

  document.getElementById('reveal-key-btn').addEventListener('click', function() {
    const hide = cfgKey.type === 'text';
    cfgKey.type = hide ? 'password' : 'text';
    this.textContent = hide ? 'Show' : 'Hide';
  });

  document.getElementById('regen-key-btn').addEventListener('click', function() {
    if (!confirm('Regenerate stream key? Current streamers will be disconnected.')) return;
    cfgKey.value = randomReadableKey();
    cfgKey.type = 'text';
    document.getElementById('reveal-key-btn').textContent = 'Hide';
  });

  document.getElementById('save-cfg-btn').addEventListener('click', () => {
    const body = {
      stream_title:   cfgTitle.value.trim(),
      ffmpeg_flags:   cfgFFmpeg.value.trim(),
      quality_preset: cfgQuality.value,
      obs_ws_url:     obsUrlEl.value.trim(),
    };
    if (cfgKey.value.trim()) body.stream_key = cfgKey.value.trim();
    post('/api/admin/config', body).then(() => {
      const el = document.getElementById('save-status');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    });
  });

  document.getElementById('restart-stream-btn').addEventListener('click', () => {
    if (confirm('Restart FFmpeg ingest?')) post('/api/admin/stream/restart', {});
  });

  // --- Sessions ---
  function loadSessions() {
    fetch('/api/admin/sessions').then(r => r.json()).then(sessions => {
      if (!Array.isArray(sessions)) return;
      const tbody = document.getElementById('session-body');
      tbody.innerHTML = '';
      sessions.forEach(s => {
        const tr = document.createElement('tr');
        tr.className = 'session-row';
        const started = new Date(s.started_at * 1000).toLocaleString();
        const dur = s.duration_s ? formatUptime(s.duration_s) : (s.ended_at ? '—' : '<span style="color:var(--live)">LIVE</span>');
        tr.innerHTML = `
          <td style="color:var(--muted)">${s.id}</td>
          <td>${started}</td>
          <td>${dur}</td>
          <td>${s.peak_viewers}</td>
          <td style="color:var(--muted)">${s.end_reason || '—'}</td>`;
        tbody.appendChild(tr);
      });
    }).catch(() => {});
  }
  loadSessions();
  setInterval(loadSessions, 30000);

  // --- Helpers ---
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function post(url, body) {
    return fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  }
  function randomReadableKey() {
    const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
    const arr = new Uint8Array(12);
    crypto.getRandomValues(arr);
    let out = '';
    for (let i = 0; i < 12; i++) {
      out += chars[arr[i] % chars.length];
      if (i === 3 || i === 7) out += '-';
    }
    return out;
  }

  // --- OBS WebSocket (v5 protocol) ---
  (function() {
    let obsWs = null, obsConnected = false, obsStreaming = false, obsRecording = false;
    let obsReqId = 0;
    const obsCallbacks = {};

    const obsPassEl     = document.getElementById('obs-password');
    const obsUrlInput   = document.getElementById('obs-url');
    const obsErrorEl    = document.getElementById('obs-error');
    const obsConnectBtn = document.getElementById('obs-connect-btn');
    const obsStreamBtn  = document.getElementById('obs-stream-btn');
    const obsRecordBtn  = document.getElementById('obs-record-btn');
    const obsSceneSel   = document.getElementById('obs-scene-select');
    const obsDot        = document.getElementById('obs-dot');
    const obsForm       = document.getElementById('obs-connect-form');
    const obsControls   = document.getElementById('obs-controls');

    const savedPass = localStorage.getItem('obs_password');
    if (savedPass) obsPassEl.value = savedPass;

    async function sha256b64(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return btoa(String.fromCharCode(...new Uint8Array(buf)));
    }

    function obsSend(op, data) {
      if (obsWs && obsWs.readyState === WebSocket.OPEN)
        obsWs.send(JSON.stringify({ op, d: data }));
    }

    function obsRequest(type, data, cb) {
      const id = String(++obsReqId);
      if (cb) obsCallbacks[id] = cb;
      obsSend(6, { requestType: type, requestId: id, requestData: data || {} });
    }

    function obsSetState(connected) {
      obsConnected = connected;
      obsDot.classList.toggle('live', connected);
      obsForm.classList.toggle('d-none', connected);
      obsControls.classList.toggle('d-none', !connected);
      obsErrorEl.textContent = '';
    }

    function obsSetStreaming(active) {
      obsStreaming = active;
      obsStreamBtn.textContent = active ? 'Stop Stream' : 'Start Stream';
      obsStreamBtn.classList.toggle('danger', active);
    }

    function obsSetRecording(active) {
      obsRecording = active;
      obsRecordBtn.textContent = active ? 'Stop Record' : 'Start Record';
      obsRecordBtn.classList.toggle('danger', active);
    }

    function obsPopulateScenes(scenes, current) {
      obsSceneSel.innerHTML = '';
      [...scenes].reverse().forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.sceneName;
        opt.textContent = s.sceneName;
        if (s.sceneName === current) opt.selected = true;
        obsSceneSel.appendChild(opt);
      });
    }

    function obsOnIdentified() {
      obsSetState(true);
      obsRequest('GetStreamStatus', {}, d => { if (d) obsSetStreaming(d.outputActive); });
      obsRequest('GetRecordStatus', {}, d => { if (d) obsSetRecording(d.outputActive); });
      obsRequest('GetSceneList', {}, d => {
        if (d) obsPopulateScenes(d.scenes, d.currentProgramSceneName);
      });
    }

    function obsHandleEvent(type, data) {
      if      (type === 'StreamStateChanged')          obsSetStreaming(data.outputActive);
      else if (type === 'RecordStateChanged')           obsSetRecording(data.outputActive);
      else if (type === 'CurrentProgramSceneChanged')   obsSceneSel.value = data.sceneName;
      else if (type === 'SceneListChanged') {
        obsRequest('GetSceneList', {}, d => {
          if (d) obsPopulateScenes(d.scenes, obsSceneSel.value || d.currentProgramSceneName);
        });
      }
    }

    async function obsConnect() {
      const password = obsPassEl.value;
      localStorage.setItem('obs_password', password);
      // persist the URL via config save so the proxy uses it
      post('/api/admin/config', { obs_ws_url: obsUrlInput.value.trim() }).catch(() => {});
      obsConnectBtn.textContent = 'Connecting…';
      obsConnectBtn.disabled = true;
      obsErrorEl.textContent = '';

      if (obsWs) { obsWs.close(); obsWs = null; }
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      obsWs = new WebSocket(`${proto}://${location.host}/obs-ws`);

      obsWs.addEventListener('message', async e => {
        const { op, d } = JSON.parse(e.data);
        if (op === 0) { // Hello
          let auth;
          if (d.authentication && password) {
            const secret = await sha256b64(password + d.authentication.salt);
            auth = await sha256b64(secret + d.authentication.challenge);
          }
          obsSend(1, { rpcVersion: 1, ...(auth ? { authentication: auth } : {}) });
        } else if (op === 2) { // Identified
          obsConnectBtn.textContent = 'Connect';
          obsConnectBtn.disabled = false;
          obsOnIdentified();
        } else if (op === 5) { // Event
          obsHandleEvent(d.eventType, d.eventData || {});
        } else if (op === 7) { // RequestResponse
          const cb = obsCallbacks[d.requestId];
          if (cb) { delete obsCallbacks[d.requestId]; cb(d.requestStatus.result ? (d.responseData || {}) : null); }
        }
      });

      obsWs.addEventListener('close', () => {
        obsConnectBtn.textContent = 'Connect';
        obsConnectBtn.disabled = false;
        obsSetState(false);
      });

      obsWs.addEventListener('error', () => {
        obsErrorEl.textContent = 'Could not connect';
        obsConnectBtn.textContent = 'Connect';
        obsConnectBtn.disabled = false;
      });
    }

    obsConnectBtn.addEventListener('click', obsConnect);
    document.getElementById('obs-disconnect-btn').addEventListener('click', () => {
      if (obsWs) { obsWs.close(); obsWs = null; }
    });
    obsStreamBtn.addEventListener('click', () => obsRequest(obsStreaming ? 'StopStream' : 'StartStream', {}));
    obsRecordBtn.addEventListener('click', () => obsRequest(obsRecording ? 'StopRecord' : 'StartRecord', {}));
    obsSceneSel.addEventListener('change', e => obsRequest('SetCurrentProgramScene', { sceneName: e.target.value }));
  })();

  drawSparkline();
})();
</script>
</body>
</html>
