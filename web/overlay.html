<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Overlay</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }

  #messages {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 5px;
    padding: 16px;
    max-height: 100vh;
    overflow: hidden;
  }

  .msg {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
    max-width: 100%;
    animation: fade-in 180ms ease;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.35;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8));
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-user {
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .msg-text {
    color: #ffffff;
    word-break: break-word;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,0.7);
  }
</style>
</head>
<body>
<div id="messages"></div>
<script>
(function() {
  'use strict';

  const MAX_MSGS = 30;
  const container = document.getElementById('messages');
  const shown = new Set();

  function usernameColor(username) {
    const colors = ['#ffb347','#7ec8e3','#b5e88a','#f4a0c0','#c3a6ff','#f9e07b'];
    let h = 0;
    for (let i = 0; i < username.length; i++) h = Math.imul(31, h) + username.charCodeAt(i) | 0;
    return colors[Math.abs(h) % colors.length];
  }

  function addMessage(id, username, text) {
    if (shown.has(id)) return;
    shown.add(id);

    const el = document.createElement('div');
    el.className = 'msg';
    el.innerHTML = `<span class="msg-user" style="color:${usernameColor(username)}">${esc(username)}</span><span class="msg-text">${esc(text)}</span>`;
    container.appendChild(el);

    // Keep at most MAX_MSGS messages
    while (container.children.length > MAX_MSGS) {
      const old = container.firstChild;
      shown.delete(old.dataset.id);
      container.removeChild(old);
    }
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // WebSocket — reconnects automatically
  let ws = null, wsTimer = null;
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws?username=overlay`);
    ws.addEventListener('message', e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'chat_message') {
          const p = msg.payload;
          addMessage(p.id, p.username, p.message);
        } else if (msg.type === 'chat_history') {
          (msg.payload || []).forEach(m => addMessage(m.id, m.username, m.message));
        } else if (msg.type === 'chat_clear') {
          container.innerHTML = '';
          shown.clear();
        }
      } catch(_) {}
    });
    ws.addEventListener('close', () => { wsTimer = setTimeout(connect, 3000); });
    ws.addEventListener('error', () => ws.close());
  }
  connect();
})();
</script>
</body>
</html>
